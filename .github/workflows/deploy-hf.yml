name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python3 << 'PYEOF'
          from huggingface_hub import HfApi
          import os

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          space_id = "wu549337178/9router"

          # 获取用户名
          user = api.whoami()
          username = user["name"]
          print(f"✅ 登录: {username}")

          # 创建 Space
          try:
              api.create_repo(
                  repo_id=space_id,
                  repo_type="space",
                  space_sdk="docker",
                  private=True
              )
              print(f"✅ Space 创建成功")
          except Exception as e:
              if "409" in str(e) or "already exists" in str(e).lower():
                  print(f"⚠️ Space 已存在，继续")
              else:
                  print(f"❌ 创建失败: {e}")

          # 上传文件
          api.upload_folder(
              repo_id=space_id,
              repo_type="space",
              folder_path=".",
              path_in_repo="",
              commit_message="Deploy from GitHub Actions"
          )
          print(f"✅ 部署完成！")
          print(f"📍 https://huggingface.co/spaces/{space_id}")
          print(f"📊 https://{space_id.replace('/', '-')}.hf.space/dashboard")
          PYEOF
