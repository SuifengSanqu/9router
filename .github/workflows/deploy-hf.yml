name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Space (if needed) and Push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          SPACE="wu549337178/9router"

          echo "📦 创建/检查 Space..."
          curl -sf --connect-timeout 30 -X POST \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"repo_id\":\"$SPACE\",\"repo_type\":\"space\",\"sdk\":\"docker\"}" \
            "https://huggingface.co/api/repos/create" || true

          echo "📤 推送代码..."
          git init
          git config user.email "gh-actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b main
          git add .
          git commit -m "Deploy 9router" --allow-empty
          git remote add hf "https://hf:${HF_TOKEN}@huggingface.co/spaces/${SPACE}"
          git push -u hf main --force

          echo ""
          echo "✅ 部署完成！"
          echo "::notice::https://huggingface.co/spaces/wu549337178/9router"
          echo "::notice::Dashboard: https://wu549337178-9router.hf.space/dashboard"
